<div class="card mt-4">

    <div class="card-header bg-primary text-white">

        <h4>Recent Trips</h4>

    </div>

    <div class="card-body">

        <table class="table table-hover">

            <thead>

                <tr>

                    <th>Vehicle</th>

                    <th>From</th>

                    <th>To</th>

                    <th>Status</th>

                </tr>

            </thead>

            <tbody>

            {% for trip in trips %}

            <tr>

                <td>{{ trip.vehicle }}</td>

                <td>{{ trip.from }}</td>

                <td>{{ trip.to }}</td>

                <td>{{ trip.status }}</td>

            </tr>

            {% endfor %}

            </tbody>

        </table>

    </div>

</div>
